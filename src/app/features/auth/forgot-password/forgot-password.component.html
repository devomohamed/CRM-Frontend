<div class="auth-wrapper flex items-center justify-center min-h-screen p-4 bg-slate-900">
    <div class="glass p-8 md:p-12 shadow-2xl rounded-3xl w-full max-w-md transition-all duration-300">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-bold mb-2 text-gradient">Reset Password</h2>
            <p class="text-slate-600 font-medium">We'll help you get back into your account</p>
        </div>

        <form *ngIf="!isSubmitted" [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
            <p class="text-slate-600 text-center text-sm px-2">Enter the email address associated with your account and
                we'll send you a link to reset your password.</p>

            <div class="flex flex-col gap-2">
                <label for="email" class="font-bold text-slate-700 ml-1">Email Address</label>
                <div class="relative w-full">
                    <i class="pi pi-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 z-10"></i>
                    <input pInputText id="email" formControlName="email" type="email" placeholder="email@example.com"
                        class="w-full !rounded-2xl !py-4 !pl-12 !border-slate-200 focus:!border-indigo-500 transition-all" />
                </div>
                <p-message
                    *ngIf="forgotForm.get('email')?.invalid && (forgotForm.get('email')?.dirty || forgotForm.get('email')?.touched)"
                    severity="error" text="Invalid email format" styleClass="w-full !rounded-xl"></p-message>
            </div>

            <div *ngIf="errorMessage" class="animate-in fade-in slide-in-from-top-1">
                <p-message severity="error" [text]="errorMessage" styleClass="w-full !rounded-xl"></p-message>
            </div>

            <p-button label="Send Reset Link" type="submit" [loading]="isLoading" [disabled]="forgotForm.invalid"
                styleClass="w-full !rounded-2xl !py-4 !text-xl !font-bold p-button-raised !bg-gradient-to-r !from-blue-800 !to-violet-600 !border-none hover:!scale-[1.02] active:!scale-[0.98] transition-all"></p-button>
        </form>

        <div *ngIf="isSubmitted" class="text-center py-8 animate-in zoom-in duration-300">
            <div
                class="flex items-center justify-center bg-green-100/50 border-2 border-green-500/20 rounded-full w-20 h-20 mx-auto mb-6 shadow-inner">
                <i class="pi pi-check text-4xl text-green-600"></i>
            </div>
            <h3 class="text-2xl font-bold mb-3 text-slate-800">Check Your Email</h3>
            <p class="text-slate-600 mb-8 font-medium">We've sent a password reset link to your inbox. Please follow the
                instructions there.</p>
            <p-button label="Return to Login" routerLink="/login"
                styleClass="p-button-text !font-bold !text-indigo-600 !text-lg hover:!bg-indigo-50 !rounded-xl transition-all"></p-button>
        </div>

        <div class="flex justify-center mt-4">
            <a routerLink="/login"
                class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors flex items-center gap-2 group">
                <i class="pi pi-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                <span>Back to Login</span>
            </a>
        </div>
    </div>
</div>
